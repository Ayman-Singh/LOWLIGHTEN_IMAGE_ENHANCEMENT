#### ELIEI Paper-Exact Config for Kaggle GPU Training
#### Paper: "Enhancing Low-light Images using Infrared Encoded Images" (ICIP 2023)
#### All settings match the paper exactly.
name: ELIEI_IR_RGB
use_tb_logger: false
model: LLFlow
distortion: sr
scale: 1
gpu_ids: [0]
dataset: IR_Dataset

#### datasets
datasets:
  train:
    root: data/train
    quant: 32
    use_shuffle: true
    n_workers: 4
    batch_size: 16        # Paper: 16
    use_flip: true
    color: RGB
    use_crop: true
    GT_size: 160          # Paper: 160
    noise_prob: 0
    noise_level: 5
    log_low: true
    gamma_aug: false

  val:
    root: data/eval
    n_workers: 2
    quant: 32
    n_max: 20
    batch_size: 1
    log_low: true

#### Test Settings
dataroot_GT: data/eval/high
dataroot_LR: data/eval/low
heat: 0.0
model_path: experiments/ELIEI_IR_RGB/models/best_psnr_G.pth

#### network structures — Paper exact
network_G:
  which_model_G: LLFlow
  in_nc: 3
  out_nc: 3
  nf: 32                  # Paper: 32
  nb: 4                   # Paper: 4 RRDB blocks
  train_RRDB: false
  train_RRDB_delay: 0.5   # Paper: freeze RRDB first 50%

  flow:
    K: 4                  # Paper: 4 flow steps per level
    L: 3                  # Paper: 3 levels
    noInitialInj: true
    coupling: CondAffineSeparatedAndCond
    additionalFlowNoAffine: 2
    conditionInFeaDim: 64 # Paper: 64
    split:
      enable: false
    fea_up0: true
    stackRRDB:
      blocks: [1]
      concat: true

#### path
path:
  strict_load: true
  resume_state: auto

#### training settings — Paper exact
train:
  manual_seed: 10
  lr_G: !!float 5e-4        # Paper: 5e-4
  weight_decay_G: 0
  beta1: 0.9                 # Paper: Adam(0.9, 0.99)
  beta2: 0.99
  lr_scheme: MultiStepLR     # Paper: MultiStepLR
  warmup_iter: -1
  lr_steps_rel: [0.5, 0.75, 0.9, 0.95]  # Paper: decay at 50%, 75%, 90%, 95%
  lr_gamma: 0.5              # Paper: gamma=0.5
  EMD: true
  weight_l1: 0
  weight_fl: 1               # Paper: NLL weight = 1
  weight_emd: !!float 1e-2   # Paper: CAL weight = 0.01
  niter: 200000              # Paper: 200K iterations
  val_freq: 2000

#### validation settings
val:
  heats: [0.0]
  n_sample: 4

test:
  heats: [0.0, 0.7, 0.8, 0.9]

#### logger
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
